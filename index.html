<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js + SketchFab</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0c0b;
        --surface: #18150f;
        --gold: #c9a84c;
        --gold-dim: #7a6028;
        --cream: #f0e8d5;
        --muted: #6b6255;
        --border: rgba(201, 168, 76, 0.18);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--cream);
        font-family: "Space Mono", monospace;
        overflow: hidden;
      }

      #scene-canvas {
        display: block;
        position: fixed;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
      }

      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 32px;
        background: linear-gradient(
          to bottom,
          rgba(13, 12, 11, 0.9) 60%,
          transparent
        );
        pointer-events: none;
      }

      .logo {
        font-family: "Playfair Display", serif;
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--gold);
      }

      .logo span {
        color: var(--cream);
        font-weight: 400;
      }

      .badge {
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 2px;
      }

      /* ── Controles na tela ── */
      .hint-panel {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        gap: 24px;
        background: rgba(13, 12, 11, 0.75);
        border: 1px solid var(--border);
        backdrop-filter: blur(8px);
        padding: 10px 24px;
        border-radius: 2px;
        pointer-events: none;
      }

      .hint {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.68rem;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .hint-icon {
        width: 22px;
        height: 22px;
        border: 1px solid var(--gold-dim);
        border-radius: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--gold);
        font-size: 0.75rem;
        flex-shrink: 0;
      }

      /* ── Infos ── */
      .info-panel {
        position: fixed;
        top: 50%;
        right: 28px;
        transform: translateY(-50%);
        z-index: 10;
        background: rgba(13, 12, 11, 0.75);
        border: 1px solid var(--border);
        backdrop-filter: blur(8px);
        padding: 20px 18px;
        width: 180px;
        border-radius: 2px;
      }

      .info-label {
        font-size: 0.58rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--gold-dim);
        margin-bottom: 4px;
      }

      .info-value {
        font-family: "Playfair Display", serif;
        font-size: 1rem;
        color: var(--cream);
        margin-bottom: 14px;
        line-height: 1.3;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 10px 0;
      }

      /* ── Loading ── */
      #loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.6s ease;
      }

      #loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-title {
        font-family: "Playfair Display", serif;
        font-size: 2rem;
        color: var(--gold);
        letter-spacing: 0.06em;
      }

      .loading-bar-track {
        width: 220px;
        height: 2px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }

      .loading-bar-fill {
        height: 100%;
        background: var(--gold);
        width: 0%;
        transition: width 0.3s ease;
        border-radius: 2px;
      }

      .loading-sub {
        font-size: 0.7rem;
        color: var(--muted);
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay">
      <div class="loading-title">Simple Chair</div>
      <div class="loading-bar-track">
        <div class="loading-bar-fill" id="loading-bar"></div>
      </div>
      <div class="loading-sub" id="loading-text">Inicializando cena…</div>
    </div>

    <canvas id="scene-canvas"></canvas>

    <header>
      <div class="logo">Simple <span>Chair</span></div>
      <div class="badge">Three.js · GLTFLoader · OrbitControls</div>
    </header>

    <div class="info-panel">
      <div class="info-label">Modelo</div>
      <div class="info-value">Simple Chair</div>
      <hr class="divider" />
      <div class="info-label">Fonte</div>
      <div
        class="info-value"
        style="
          font-family: &quot;Space Mono&quot;, monospace;
          font-size: 0.65rem;
          color: var(--muted);
        "
      >
        Sketchfab<br />CC Attribution
      </div>
      <hr class="divider" />
      <div class="info-label">Formato</div>
      <div class="info-value" style="font-size: 0.8rem">.glb</div>
    </div>

    <!-- Controles -->
    <div class="hint-panel">
      <div class="hint">
        <div class="hint-icon">↻</div>
        Arrastar para rotacionar
      </div>
      <div class="hint">
        <div class="hint-icon">⇕</div>
        Scroll para zoom
      </div>
      <div class="hint">
        <div class="hint-icon">⇔</div>
        Botão direito para pan
      </div>
    </div>

    <!-- Three.js via CDN (ES module importmap) -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      // === DOM refs =============================================================
      const canvas = document.getElementById("scene-canvas");
      const loadingOverlay = document.getElementById("loading-overlay");
      const loadingBar = document.getElementById("loading-bar");
      const loadingText = document.getElementById("loading-text");

      // === Renderer =============================================================
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: false,
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;

      // === Scene ================================================================
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0d0c0b);
      scene.fog = new THREE.FogExp2(0x0d0c0b, 0.08);

      // === Camera ================================================================
      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.01,
        200,
      );
      camera.position.set(2.5, 1.6, 2.5);

      // === Lights ================================================================
      // Ambient
      const ambientLight = new THREE.AmbientLight(0xfff4e0, 0.6);
      scene.add(ambientLight);

      // Key light
      const keyLight = new THREE.DirectionalLight(0xfff0cc, 2.8);
      keyLight.position.set(4, 8, 5);
      keyLight.castShadow = true;
      keyLight.shadow.mapSize.set(2048, 2048);
      keyLight.shadow.camera.near = 0.5;
      keyLight.shadow.camera.far = 50;
      keyLight.shadow.camera.left = -5;
      keyLight.shadow.camera.right = 5;
      keyLight.shadow.camera.top = 5;
      keyLight.shadow.camera.bottom = -5;
      keyLight.shadow.bias = -0.001;
      scene.add(keyLight);

      const fillLight = new THREE.DirectionalLight(0xaac4ff, 0.6);
      fillLight.position.set(-5, 3, -2);
      scene.add(fillLight);

      const rimLight = new THREE.DirectionalLight(0xffaa55, 0.4);
      rimLight.position.set(0, 2, -6);
      scene.add(rimLight);

      // === Solo (sombras) ===================================================
      const groundGeometry = new THREE.CircleGeometry(6, 64);
      const groundMaterial = new THREE.MeshStandardMaterial({
        color: 0x1a160f,
        roughness: 0.9,
        metalness: 0.1,
      });
      const ground = new THREE.Mesh(groundGeometry, groundMaterial);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      // === OrbitControls ========================================================
      const controls = new OrbitControls(camera, canvas);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.minDistance = 0.5;
      controls.maxDistance = 18;
      controls.maxPolarAngle = Math.PI / 2 + 0.1; // slight below ground allowed
      controls.target.set(0, 0.5, 0);
      controls.update();

      // === Load GLTF model ========================================================
      const loader = new GLTFLoader();

      loadingText.textContent = "Carregando modelo…";

      loader.load(
        "simple_chair.glb",

        (gltf) => {
          const model = gltf.scene;

          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 1.6 / maxDim;

          model.scale.setScalar(scale);
          model.position.sub(center.multiplyScalar(scale));

          const boxAfter = new THREE.Box3().setFromObject(model);
          model.position.y -= boxAfter.min.y;

          model.traverse((node) => {
            if (node.isMesh) {
              node.castShadow = true;
              node.receiveShadow = true;

              const materials = Array.isArray(node.material)
                ? node.material
                : [node.material];

              materials.forEach((mat) => {
                mat.side = THREE.DoubleSide;
                mat.transparent = false;
                mat.alphaTest = 0;
                mat.depthWrite = true;
                mat.needsUpdate = true;
              });
            }
          });

          scene.add(model);

          controls.target.set(0, (boxAfter.max.y - boxAfter.min.y) / 2, 0);
          controls.update();

          loadingBar.style.width = "100%";
          loadingText.textContent = "Pronto!";
          setTimeout(() => loadingOverlay.classList.add("hidden"), 500);
        },

        (event) => {
          if (event.lengthComputable) {
            const pct = (event.loaded / event.total) * 100;
            loadingBar.style.width = `${pct.toFixed(0)}%`;
            loadingText.textContent = `Carregando… ${pct.toFixed(0)}%`;
          }
        },

        // === Error ===
        (error) => {
          console.error("Erro ao carregar o modelo:", error);
          loadingText.textContent =
            "Erro ao carregar simple_chair.glb — verifique o console.";
          loadingText.style.color = "#e05c5c";
        },
      );

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      }
      window.addEventListener("resize", onWindowResize);

      // === Animation loop =======================================================
      function animate() {
        requestAnimationFrame(animate);
        controls.update(); // required for damping
        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
